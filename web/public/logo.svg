<svg width="512" height="512" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --logo-black: #0A0A0A;
      --logo-white: #FFFFFF;
      --logo-neutral-700: #2B2B2B;
      --logo-neutral-300: #D9D9D9;
      --logo-bg: var(--logo-black);
      --logo-glyph: var(--logo-white);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --logo-bg: var(--logo-white);
        --logo-glyph: var(--logo-black);
      }
    }
  </style>
  <rect width="128" height="128" rx="28" fill="var(--logo-bg)" />
  <circle cx="40" cy="40" r="15" fill="var(--logo-glyph)" opacity="0.96" />
  <circle cx="88" cy="88" r="15" fill="var(--logo-glyph)" opacity="0.96" />
  <rect x="58" y="58" width="14" height="14" rx="2" transform="rotate(45 64 64)" fill="var(--logo-bg)" />
  <rect x="50" y="50" width="12" height="8" rx="4" transform="rotate(45 54 54)" fill="var(--logo-glyph)" opacity="0.96" />
  <rect x="66" y="66" width="12" height="8" rx="4" transform="rotate(45 72 70)" fill="var(--logo-glyph)" opacity="0.96" />
  <circle cx="64" cy="64" r="5" fill="var(--logo-glyph)" />
</svg>
